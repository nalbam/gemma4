<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>gemma4 web</title>
<style>
  :root {
    --bg: #0f1116; --panel: #181b22; --border: #2a2f3a; --text: #e6e8ec;
    --dim: #8b93a1; --green: #36c46f; --yellow: #e0b341; --red: #e2503b; --accent: #5b8cff;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body { margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .wrap { height: 100dvh; max-width: 1100px; margin: 0 auto; padding: 12px;
    display: flex; flex-direction: column; gap: 12px; }
  h1 { font-size: 18px; margin: 0; }
  h2 { font-size: 13px; color: var(--dim); margin: 0 0 8px; text-transform: uppercase; letter-spacing: .04em; }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .panel.chat { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .panel.chat h2 { flex-shrink: 0; }
  .row { display: flex; align-items: center; gap: 12px; }
  .spacer { flex: 1; }
  .badge { padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .badge.on { background: rgba(54,196,111,.15); color: var(--green); }
  .badge.off { background: rgba(226,80,59,.15); color: var(--red); }
  .badge.loading { background: rgba(224,179,65,.15); color: var(--yellow); }
  button { background: var(--accent); color: #fff; border: 0; border-radius: 8px;
    padding: 7px 14px; font-size: 13px; font-weight: 600; cursor: pointer; }
  button.ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
  button:disabled { opacity: .45; cursor: not-allowed; }
  select.ghost { background: transparent; border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 7px 10px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .metric { margin: 6px 0; }
  .metric .label { display: flex; justify-content: space-between; font-size: 12px; color: var(--dim); margin-bottom: 2px; }
  .bar { height: 6px; background: #11141a; border-radius: 3px; overflow: hidden; }
  .bar > span { display: block; height: 100%; width: 0; border-radius: 3px; transition: width .4s ease, background .4s; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 24px; }
  #log { flex: 1; min-height: 0; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 4px; }
  .msg { max-width: 80%; padding: 9px 13px; border-radius: 12px; white-space: pre-wrap; word-break: break-word; }
  .msg.user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 3px; }
  .msg.bot { align-self: flex-start; background: #20242e; border-bottom-left-radius: 3px; }
  .msg.err { align-self: flex-start; background: rgba(226,80,59,.15); color: var(--red); }
  .msg strong { font-weight: 700; }
  .msg code { background: rgba(255,255,255,.1); padding: 1px 5px; border-radius: 4px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12.5px; }
  .msg pre { background: #11141a; padding: 10px 12px; border-radius: 8px;
    overflow-x: auto; margin: 6px 0; white-space: pre; }
  .msg pre code { background: none; padding: 0; }
  .meta { align-self: flex-start; font-size: 11px; color: var(--dim); margin-top: -4px; padding-left: 4px; }
  .msg table { border-collapse: collapse; margin: 6px 0; font-size: 12.5px; display: block; overflow-x: auto; max-width: 100%; }
  .msg th, .msg td { border: 1px solid var(--border); padding: 4px 9px; text-align: left; white-space: nowrap; }
  .msg th { background: rgba(255,255,255,.06); font-weight: 600; }
  .msg-img { max-width: 100%; max-height: 280px; border-radius: 8px; display: block; margin-bottom: 6px; }
  .preview { position: relative; display: inline-block; }
  .preview img { max-height: 80px; border-radius: 8px; border: 1px solid var(--border); display: block; }
  .preview .rm { position: absolute; top: -8px; right: -8px; width: 22px; height: 22px; padding: 0;
    border-radius: 50%; background: var(--red); line-height: 1; font-size: 13px; }
  #attach { padding: 7px 11px; font-size: 16px; }
  .composer { display: flex; gap: 8px; margin-top: 12px; }
  .composer { flex-shrink: 0; }
  .composer textarea { flex: 1; resize: none; background: #11141a; color: var(--text);
    border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; font: inherit; height: 42px; }
  .hint { color: var(--dim); font-size: 12px; }
  @media (max-width: 560px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="wrap">

  <div class="panel">
    <div class="row">
      <h1>gemma4 <span id="modelName" class="hint">gemma-4-12B-it</span></h1>
      <div class="spacer"></div>
      <span id="badge" class="badge off">확인 중…</span>
      <select id="variant" class="ghost">
        {% for v in variants %}<option value="{{ v }}"{% if v == default_variant %} selected{% endif %}>{{ v }}</option>{% endfor %}
      </select>
      <button id="btnStart" class="ghost">시작</button>
      <button id="btnStop" class="ghost">중지</button>
    </div>
    <div id="ctrlMsg" class="hint" style="margin-top:8px"></div>
  </div>

  <div class="panel">
    <div class="grid">
      <div>
        <h2>전체 시스템</h2>
        <div class="metric"><div class="label"><span>CPU</span><span id="sysCpuT">–</span></div><div class="bar"><span id="sysCpu"></span></div></div>
        <div class="metric"><div class="label"><span>MEM</span><span id="sysMemT">–</span></div><div class="bar"><span id="sysMem"></span></div></div>
      </div>
      <div>
        <h2>gemma4 프로세스</h2>
        <div class="metric"><div class="label"><span>CPU</span><span id="pCpuT">–</span></div><div class="bar"><span id="pCpu"></span></div></div>
        <div class="metric"><div class="label"><span>MEM</span><span id="pMemT">–</span></div><div class="bar"><span id="pMem"></span></div></div>
      </div>
    </div>
  </div>

  <div class="panel chat">
    <h2>채팅</h2>
    <div id="log"></div>
    <div id="preview" class="preview" hidden></div>
    <div class="composer">
      <button id="attach" class="ghost" title="이미지 첨부">📎</button>
      <input id="file" type="file" accept="image/*" hidden>
      <textarea id="input" placeholder="메시지를 입력하세요 (Enter 전송, Shift+Enter 줄바꿈)"></textarea>
      <button id="send">전송</button>
    </div>
  </div>

</div>

<script>
const $ = (id) => document.getElementById(id);
let pendingState = null;  // 'on' | 'off' — 서버 전환 대기 상태(도달하면 안내 메시지 제거)
let currentVariant = null;  // 실행 중 로드된 variant ('4bit'|'8bit'|null)
let initialSync = false;    // 최초 poll 시 select를 실행 중 variant로 1회 동기화
const VARIANT_KEY = 'gemma4.variant';  // 선택한 정밀도 localStorage 키

// ---- 색상: 임계값 ----
function colorFor(pct) {
  if (pct >= 85) return getComputedStyle(document.documentElement).getPropertyValue('--red');
  if (pct >= 60) return getComputedStyle(document.documentElement).getPropertyValue('--yellow');
  return getComputedStyle(document.documentElement).getPropertyValue('--green');
}
// ---- 경량 마크다운 렌더 (escape 먼저 → XSS 방지) ----
function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function splitRow(line) {
  return line.trim().replace(/^\||\|$/g, '').split('|').map(s => s.trim());
}
function renderTables(text) {
  const lines = text.split('\n');
  const out = [];
  let i = 0;
  while (i < lines.length) {
    // 헤더 |...| + 구분선 |:--|--| 이 연속이면 테이블
    if (/^\s*\|.*\|\s*$/.test(lines[i]) && i + 1 < lines.length && /^\s*\|[\s:|-]+\|\s*$/.test(lines[i + 1])) {
      const header = splitRow(lines[i]);
      i += 2;
      let t = '<table><thead><tr>' + header.map(c => `<th>${c}</th>`).join('') + '</tr></thead><tbody>';
      while (i < lines.length && /^\s*\|.*\|\s*$/.test(lines[i])) {
        t += '<tr>' + splitRow(lines[i]).map(c => `<td>${c}</td>`).join('') + '</tr>';
        i++;
      }
      out.push(t + '</tbody></table>');
    } else {
      out.push(lines[i]); i++;
    }
  }
  return out.join('\n');
}
function renderMarkdown(text) {
  let h = escapeHtml(text);
  h = h.replace(/```[\w]*\n?([\s\S]*?)```/g, (_, c) => `<pre><code>${c.replace(/\n$/, '')}</code></pre>`);
  h = renderTables(h);
  h = h.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  h = h.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
  h = h.replace(/^#{1,6}\s+(.+)$/gm, '<strong>$1</strong>');
  h = h.replace(/^\s*[-*]\s+(.+)$/gm, '• $1');
  return h;
}

function setBar(barId, txtId, pct, text) {
  const el = $(barId);
  el.style.width = Math.min(100, Math.max(0, pct)) + '%';
  el.style.background = colorFor(pct);
  $(txtId).textContent = text;
}

// ---- 모니터링 폴링 ----
async function poll() {
  try {
    const m = await (await fetch('/api/metrics')).json();
    setBar('sysCpu', 'sysCpuT', m.system.cpu, m.system.cpu + '%');
    setBar('sysMem', 'sysMemT', m.system.mem_pct, `${m.system.mem_used_gb} / ${m.system.mem_total_gb} GB`);
    const p = m.process;
    const state = m.state;  // 'stopped' | 'loading' | 'ready'
    if (state !== 'stopped' && p.running) {
      setBar('pCpu', 'pCpuT', p.cpu, `${p.cpu}% (raw, ${m.ncpu}코어)`);
      setBar('pMem', 'pMemT', p.mem_pct, `${p.mem_gb} / ${p.mem_total_gb} GB`);
    } else {
      setBar('pCpu', 'pCpuT', 0, '–');
      setBar('pMem', 'pMemT', 0, '–');
    }
    setBadge(state, p.pid, m.variant);
  } catch (e) { /* 일시적 실패 무시 */ }
}

function setBadge(state, pid, variant) {
  const on = state !== 'stopped';
  currentVariant = on ? variant : null;
  // 페이지 로드 시 실행 중인 variant로 select를 1회 맞춘다 (이후엔 사용자 선택 우선)
  if (!initialSync && currentVariant) $('variant').value = currentVariant;
  initialSync = true;
  // 헤더에 현재 실행 중인 모델 풀네임 표시
  $('modelName').textContent = currentVariant ? `gemma-4-12B-it-${currentVariant}` : 'gemma-4-12B-it';
  const b = $('badge');
  if (state === 'ready') {
    b.className = 'badge on';
    b.textContent = `running · ${variant} · PID ${pid}`;
  } else if (state === 'loading') {
    b.className = 'badge loading';
    b.textContent = `로딩 중… · ${variant}`;
  } else {
    b.className = 'badge off';
    b.textContent = 'stopped';
  }
  syncButtons();
  // 시작은 ready 도달 시, 중지는 stopped 도달 시 안내 메시지 제거 (loading 중엔 유지)
  if ((state === 'ready' && pendingState === 'on') || (state === 'stopped' && pendingState === 'off')) {
    $('ctrlMsg').textContent = '';
    pendingState = null;
  }
}

function syncButtons() {
  const on = currentVariant !== null;
  const sel = $('variant').value;
  $('btnStop').disabled = !on;
  // 미실행이면 시작 가능, 실행 중이라도 다른 variant 선택 시 전환 시작 가능
  $('btnStart').disabled = on && sel === currentVariant;
  // 실행 중 다른 정밀도를 고르면 버튼이 '전환'(재기동)임을 명시
  $('btnStart').textContent = (on && sel !== currentVariant) ? '전환' : '시작';
}
$('variant').onchange = () => {
  localStorage.setItem(VARIANT_KEY, $('variant').value);
  syncButtons();
};

// 저장된 정밀도(variant) 복원 — 마지막 선택을 새로고침 후에도 유지
const savedVariant = localStorage.getItem(VARIANT_KEY);
if (savedVariant && [...$('variant').options].some(o => o.value === savedVariant)) {
  $('variant').value = savedVariant;
  initialSync = true;  // 실행 중 variant가 저장값을 덮어쓰지 않도록
}

// ---- 서버 제어 ----
$('btnStart').onclick = () => control('start');
$('btnStop').onclick = () => control('stop');
async function control(action) {
  $('ctrlMsg').textContent = '처리 중…';
  try {
    const opts = { method: 'POST' };
    if (action === 'start') {
      opts.headers = { 'Content-Type': 'application/json' };
      opts.body = JSON.stringify({ variant: $('variant').value });
    }
    const r = await (await fetch('/api/server/' + action, opts)).json();
    $('ctrlMsg').textContent = r.message || '';
    pendingState = action === 'start' ? 'on' : 'off';
  } catch (e) {
    $('ctrlMsg').textContent = '요청 실패: ' + e;
    pendingState = null;
  }
  poll();
}

// ---- 채팅 ----
const history = [];
const log = $('log');
let pendingImage = null;  // 첨부된 이미지 base64 data URI

$('attach').onclick = () => $('file').click();
$('file').onchange = (e) => {
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = () => { pendingImage = r.result; showPreview(); };
  r.readAsDataURL(f);
};
function showPreview() {
  const p = $('preview');
  p.innerHTML = '';
  if (!pendingImage) { p.hidden = true; return; }
  p.hidden = false;
  const img = document.createElement('img');
  img.src = pendingImage;
  const rm = document.createElement('button');
  rm.className = 'rm'; rm.textContent = '✕';
  rm.onclick = () => { pendingImage = null; $('file').value = ''; showPreview(); };
  p.appendChild(img); p.appendChild(rm);
}

function addMsg(cls, text) {
  const d = document.createElement('div');
  d.className = 'msg ' + cls;
  d.textContent = text;
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
  return d;
}

async function send() {
  const input = $('input');
  const text = input.value.trim();
  if (!text && !pendingImage) return;
  input.value = '';
  input.disabled = true; $('send').disabled = true;

  // 사용자 버블 (이미지 + 텍스트)
  const u = document.createElement('div');
  u.className = 'msg user';
  if (pendingImage) {
    const im = document.createElement('img');
    im.className = 'msg-img'; im.src = pendingImage;
    u.appendChild(im);
  }
  if (text) {
    const tx = document.createElement('div');
    tx.textContent = text;
    u.appendChild(tx);
  }
  log.appendChild(u); log.scrollTop = log.scrollHeight;

  // content: 이미지 있으면 멀티모달 배열, 없으면 문자열
  let content;
  if (pendingImage) {
    content = [];
    if (text) content.push({ type: 'text', text });
    content.push({ type: 'image_url', image_url: { url: pendingImage } });
  } else {
    content = text;
  }
  history.push({ role: 'user', content });
  pendingImage = null; showPreview();

  const bot = addMsg('bot', '');
  const meta = document.createElement('div');
  meta.className = 'meta';
  log.appendChild(meta);
  let acc = '';

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history }),
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      bot.className = 'msg err';
      bot.textContent = err.error || ('오류 ' + resp.status);
      meta.remove();
    } else {
      const reader = resp.body.getReader();
      const dec = new TextDecoder();
      let buf = '', n = 0;
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop();  // 마지막 미완성 라인 보류
        for (const line of lines) {
          if (!line) continue;
          let obj; try { obj = JSON.parse(line); } catch { continue; }
          // 갱신 전 하단 근처였는지 확인 → 그럴 때만 따라감(위로 올려두면 유지)
          const stick = log.scrollHeight - log.scrollTop - log.clientHeight < 80;
          acc += obj.delta;
          n = obj.n;
          bot.innerHTML = renderMarkdown(acc);
          meta.textContent = n + ' 토큰';
          if (stick) log.scrollTop = log.scrollHeight;
        }
      }
      meta.textContent = n + ' 토큰';
      history.push({ role: 'assistant', content: acc });
    }
  } catch (e) {
    bot.className = 'msg err';
    bot.textContent = '전송 실패: ' + e;
  } finally {
    input.disabled = false; $('send').disabled = false; input.focus();
  }
}

$('send').onclick = send;
$('input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

// ---- 시작 ----
poll();
setInterval(poll, 2000);
</script>
</body>
</html>
